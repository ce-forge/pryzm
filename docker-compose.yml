services:
  redis:
    image: redis:alpine
    container_name: pryzm_redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

  postgres:
    image: pgvector/pgvector:pg15
    container_name: pryzm_db
    environment:
      POSTGRES_USER: pryzm_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pryzm_core
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: pryzm_ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ./ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always
