services:
  redis:
    image: redis:alpine
    container_name: pryzm_redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

  postgres:
    image: pgvector/pgvector:pg15
    container_name: pryzm_db
    environment:
      POSTGRES_USER: pryzm_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pryzm_core
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: always

  llama-swap:
    image: ghcr.io/mostlygeek/llama-swap:cuda
    container_name: pryzm_llama_swap
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./infra/llama-swap-config.yaml:/app/config.yaml:ro
      - llama_models:/root/.cache/llama.cpp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always

volumes:
  llama_models:
