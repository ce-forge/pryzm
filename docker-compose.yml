services:
  redis:
    image: redis:alpine
    container_name: pryzm_redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

  postgres:
    image: pgvector/pgvector:pg15
    container_name: pryzm_db
    environment:
      POSTGRES_USER: pryzm_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pryzm_core
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: always

  searxng:
    image: searxng/searxng:latest
    container_name: pryzm_searxng
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      # SearxNG reads SEARXNG_SECRET at startup and uses it as `server.secret_key`
      # for CSRF / session integrity. Sourced from .env (gitignored) so the
      # value never lands in the repo.
      SEARXNG_SECRET: ${SEARXNG_SECRET}
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: always

  llama-swap:
    # Pinned by digest so SIGHUP semantics, /api/events shape, and /running
    # endpoint stay deterministic across `docker compose pull` cycles. To
    # update: pull the floating `:cuda` tag, capture its new digest with
    # `docker inspect ghcr.io/mostlygeek/llama-swap:cuda --format '{{index .RepoDigests 0}}'`,
    # and replace the digest below.
    image: ghcr.io/mostlygeek/llama-swap@sha256:1ac0ae06dc0eff1c742c80488533fa12442a47a3688f4bccbe6bbfb6d6adca58
    container_name: pryzm_llama_swap
    ports:
      - "127.0.0.1:8080:8080"
    # Container runs as root (image default). llama-server needs to create
    # /root/.cache/llama.cpp/ for its own scratch cache; non-root users can't
    # write under /root/ in the image. Files it writes into the bind-mounted
    # cache below come out root-owned on the host, but umask 022 keeps them
    # world-readable — the backend (running as the host user) only needs to
    # stat() partial blob sizes for the progress feed, not write the cache.
    volumes:
      - ./infra/llama-swap-config.yaml:/app/config.yaml:ro
      # Bind-mounted (was: named volume `llama_models`). The host directory
      # is gitignored. Backend reads it directly to surface real download
      # progress; llama-swap's HF downloader writes here. Migration from the
      # named volume: see infra/migrate-llama-cache.sh.
      - ./infra/llama_models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always
