services:
  redis:
    image: redis:alpine
    container_name: pryzm_redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

  postgres:
    image: pgvector/pgvector:pg15
    container_name: pryzm_db
    environment:
      POSTGRES_USER: pryzm_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pryzm_core
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: always

  searxng:
    image: searxng/searxng:latest
    container_name: pryzm_searxng
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: always

  llama-swap:
    # Pinned by digest so SIGHUP semantics, /api/events shape, and /running
    # endpoint stay deterministic across `docker compose pull` cycles. To
    # update: pull the floating `:cuda` tag, capture its new digest with
    # `docker inspect ghcr.io/mostlygeek/llama-swap:cuda --format '{{index .RepoDigests 0}}'`,
    # and replace the digest below.
    image: ghcr.io/mostlygeek/llama-swap@sha256:1ac0ae06dc0eff1c742c80488533fa12442a47a3688f4bccbe6bbfb6d6adca58
    container_name: pryzm_llama_swap
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./infra/llama-swap-config.yaml:/app/config.yaml:ro
      - llama_models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always

volumes:
  llama_models:
