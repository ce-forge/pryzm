[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
# E2E tests are run separately (`pytest tests/e2e/`) because the Playwright
# session-scoped browser fixture leaves asyncio state in a shape that breaks
# unit tests run after it in the same pytest invocation. Default `pytest
# tests/` runs the unit + integration suite only.
addopts = --ignore=tests/e2e
