# SearxNG config for Pryzm's local web_search tool. Inherits the upstream
# defaults and overrides only what we need:
#   - JSON format enabled (the tool uses /search?format=json)
#   - Bot-detection limiter off (we hit it from the backend, not browsers)
#   - English default language
#
# `secret_key` is required by upstream. The value here is per-deployment and
# not sensitive in a localhost-only setup, but rotate it if SearxNG ever gets
# exposed beyond loopback.

use_default_settings: true

server:
  secret_key: "bf4f19ae08f70d19584112c88376468e9d0745de37624d16e9224b60728b3fe8"
  limiter: false
  image_proxy: false
  port: 8080
  bind_address: "0.0.0.0"

search:
  formats:
    - html
    - json
  default_lang: "en"
  safe_search: 0

ui:
  default_locale: "en"
