# SearxNG config for Pryzm's local web_search tool. Inherits the upstream
# defaults and overrides only what we need:
#   - JSON format enabled (the tool uses /search?format=json)
#   - Bot-detection limiter off (we hit it from the backend, not browsers)
#   - English default language
#
# `secret_key` is required by upstream and is supplied via the SEARXNG_SECRET
# env var (see .env). Never hard-code the value here — this file is in git.

use_default_settings: true

server:
  limiter: false
  image_proxy: false
  port: 8080
  bind_address: "0.0.0.0"

search:
  formats:
    - html
    - json
  default_lang: "en"
  safe_search: 0

ui:
  default_locale: "en"
