# llama-swap configuration for Pryzm.
#
# Three model groups:
#   - chat: chat-capable models, swapped on-demand (one in VRAM at a time)
#   - always-on: embedding model, pinned in memory so RAG never pays swap cost
#
# Adding a new model: append to `models:` with the same shape, optionally
# attach a `groups` list. Reload without restart: docker compose kill -s HUP llama-swap

healthCheckTimeout: 3600   # allow first-request HuggingFace downloads to finish
startPort: 9000            # llama-server instances bind 9000+

groups:
  "chat":
    swap: true             # one chat model loaded at a time
    exclusive: false       # don't unload always-on
  "always-on":
    swap: false
    exclusive: false
    persistent: true

models:
  # Tier-1 default (small). Pinned always-on per Phase C tuning — at
  # ~1.5 GB it costs little VRAM, and keeping it resident eliminates the
  # swap penalty on the workloads the router sends to it (short_q,
  # tool_use, most medium_q). The router still picks E4B for code-fenced
  # / complex-verb / long prompts; E4B remains swappable.
  "gemma-4-E2B-it":
    cmd: |-
      /app/llama-server --port ${PORT}
      -hf bartowski/google_gemma-4-E2B-it-GGUF:Q4_K_M
      -ngl 99 --ctx-size 8192 --jinja --flash-attn on
    groups:
    - always-on
    tags: []

  # Tier-2 default (larger). Used for complex/long prompts the router
  # decides E2B can't handle. NO LONGER carries the `vision` tag —
  # captioning routes to Qwen2-VL-2B (below) which handles both
  # verbatim text extraction and structural understanding in a single
  # call, with stronger OCR/document benchmarks than Gemma-4 for this
  # use case.
  "gemma-4-E4B-it":
    cmd: |-
      /app/llama-server --port ${PORT}
      -hf bartowski/google_gemma-4-E4B-it-GGUF:Q4_K_M
      -ngl 99 --ctx-size 8192 --jinja --flash-attn on
      --cache-type-k q8_0 --cache-type-v q8_0
    groups:
    - chat
    tags:
    - code

  # Captioning model. Replaces the hybrid Gemma-4-vision + RapidOCR
  # pipeline. Qwen2-VL-2B is specifically benchmarked on UI screenshots
  # (VCR 81.45%) and documents (DocVQA 90.1, OCRBench 794), reads
  # verbatim text without language-prior pattern completion, and
  # preserves multi-column form layout — closes the value-label
  # ambiguity that broke "what is the user and pass" extraction on
  # password-manager screenshots.
  #
  # Drops in via llama-server's -hf flag; the bartowski quant ships
  # mmproj alongside the GGUF and llama-server picks it up
  # automatically. ~1 GB at Q4_K_M.
  "qwen2-vl-2B-it":
    cmd: |-
      /app/llama-server --port ${PORT}
      -hf bartowski/Qwen2-VL-2B-Instruct-GGUF:Q4_K_M
      -ngl 99 --ctx-size 8192 --jinja --flash-attn on
    groups:
    - chat
    tags:
    - vision

  "nomic-embed-text-v1.5":
    cmd: >
      /app/llama-server --port ${PORT}
      -hf nomic-ai/nomic-embed-text-v1.5-GGUF:Q8_0
      -ngl 99 --embeddings --batch-size 8192
      --rope-scaling yarn --rope-freq-scale 0.75
    groups: ["always-on"]
    tags: ["embedding"]
