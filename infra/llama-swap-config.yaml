# llama-swap configuration for Pryzm.
#
# Two groups:
#   - always-on: resident in VRAM, never auto-unloaded. Holds the small chat
#                default, the embedding model, and the vision/captioning model
#                so RAG ingestion and image captioning don't fight the chat
#                slot.
#   - chat: swappable, one model at a time. Used by the router-escalated
#           large chat model (E4B). When E4B loads it stays until something
#           else in `chat` is requested; always-on members are not affected
#           because the always-on group is `persistent`.
#
# IMPORTANT: per upstream llama-swap docs (legacy-groups syntax), group
# membership is declared via the GROUP's `members` list — NOT via a
# model-side `groups:` field. The latter is silently ignored. This file
# was previously using the wrong shape; result was that no group rules
# took effect and llama-swap fell back to default "one model at a time".
# See: https://github.com/mostlygeek/llama-swap/blob/40e39f7/config.example.yaml#L334-L396
#
# Reload without restart: docker compose kill -s HUP llama-swap

healthCheckTimeout: 3600   # allow first-request HuggingFace downloads to finish
startPort: 9000            # llama-server instances bind 9000+

groups:
  # Resident-in-VRAM models. `persistent: true` blocks other groups from
  # unloading these; `swap: false` lets every member coexist; `exclusive:
  # false` means loading an always-on member doesn't unload `chat`.
  "always-on":
    persistent: true
    swap: false
    exclusive: false
    members:
      - "gemma-4-E2B-it"
      - "nomic-embed-text-v1.5"

  # Swappable chat slot. Only E4B lives here today — it loads when the
  # router escalates and unloads when llama-swap reclaims the slot.
  "chat":
    swap: true
    exclusive: false
    members:
      - "gemma-4-E4B-it"

models:
  # Tier-1 default (small). Pinned always-on per Phase C tuning — at
  # ~1.5 GB it costs little VRAM, and keeping it resident eliminates the
  # swap penalty on the workloads the router sends to it (short_q,
  # tool_use, most medium_q). The router still picks E4B for code-fenced
  # / complex-verb / long prompts; E4B remains swappable.
  "gemma-4-E2B-it":
    cmd: |-
      /app/llama-server --port ${PORT}
      -hf bartowski/google_gemma-4-E2B-it-GGUF:Q4_K_M
      -ngl 99 --ctx-size 8192 --jinja --flash-attn on
    tags: []

  # Tier-2 default (larger). Used for complex/long prompts the router
  # decides E2B can't handle. NO LONGER carries the `vision` tag —
  # captioning routes to Qwen2-VL-2B (below) which handles both
  # verbatim text extraction and structural understanding in a single
  # call, with stronger OCR/document benchmarks than Gemma-4 for this
  # use case.
  "gemma-4-E4B-it":
    cmd: |-
      /app/llama-server --port ${PORT}
      -hf bartowski/google_gemma-4-E4B-it-GGUF:Q4_K_M
      -ngl 99 --ctx-size 32768 --jinja --flash-attn on
      --cache-type-k q8_0 --cache-type-v q8_0
    tags:
    - code

  # Captioning model. Replaces the hybrid Gemma-4-vision + RapidOCR
  # pipeline. Qwen2-VL-2B is specifically benchmarked on UI screenshots
  # (VCR 81.45%) and documents (DocVQA 90.1, OCRBench 794), reads
  # verbatim text without language-prior pattern completion, and
  # preserves multi-column form layout — closes the value-label
  # ambiguity that broke "what is the user and pass" extraction on
  # password-manager screenshots.
  #
  # Drops in via llama-server's -hf flag; the bartowski quant ships
  # mmproj alongside the GGUF and llama-server picks it up
  # automatically. ~1 GB at Q4_K_M.
  "qwen2-vl-2B-it":
    cmd: |-
      /app/llama-server --port ${PORT}
      -hf bartowski/Qwen2-VL-2B-Instruct-GGUF:Q4_K_M
      -ngl 99 --ctx-size 8192 --jinja --flash-attn on
      --repeat-penalty 1.15
    # Captioning runs only on image upload, not on chat turns. Leaving
    # the model resident wastes ~3GB VRAM between uploads. With ttl=60
    # it loads on first /v1/chat/completions for this model id and
    # unloads 60s after the last call — covers a burst of uploads
    # without paying cold-load again, and frees VRAM once you stop.
    ttl: 60
    tags:
    - vision

  "nomic-embed-text-v1.5":
    cmd: >
      /app/llama-server --port ${PORT}
      -hf nomic-ai/nomic-embed-text-v1.5-GGUF:Q8_0
      -ngl 99 --embeddings --batch-size 8192
      --rope-scaling yarn --rope-freq-scale 0.75
    tags: ["embedding"]
