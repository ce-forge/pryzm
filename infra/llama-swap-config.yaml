# llama-swap configuration for Pryzm.
#
# Two VRAM-lifecycle groups. Tags (vision, embedding, code, …) on each
# model are independent — they're routing hints, not policy.
#   - always-on: resident in VRAM, never auto-unloaded. Holds the small chat
#                default and the embedding model so RAG ingestion doesn't
#                fight the chat slot.
#   - on-demand: loaded on first use, evicted by the per-model ttl when
#                idle. Multiple members coexist in VRAM if it fits — no
#                forced swap between them. E4B (router-escalated) and the
#                vision model both live here.
# A third "inactive" state exists Pryzm-side: the backend's catalog filter
# excludes any model whose model-side `groups:` contains `inactive`. Such
# models stay in this file and keep their cache, but the chat router never
# picks them.
#
# IMPORTANT: per upstream llama-swap docs (legacy-groups syntax), group
# membership is declared via the GROUP's `members` list — NOT via a
# model-side `groups:` field. The latter is silently ignored by llama-swap
# (but Pryzm reads it for the `inactive` filter).
# See: https://github.com/mostlygeek/llama-swap/blob/40e39f7/config.example.yaml#L334-L396
#
# Reload: model edits (cmd, ngl, tags) via `docker compose kill -s HUP
# llama-swap`. Group definition changes need `docker compose restart
# llama-swap`.

healthCheckTimeout: 3600   # allow first-request HuggingFace downloads to finish
startPort: 9000            # llama-server instances bind 9000+

groups:
  # Resident-in-VRAM models. `persistent: true` blocks other groups from
  # unloading these; `swap: false` lets every member coexist; `exclusive:
  # false` means loading an always-on member doesn't unload on-demand.
  "always-on":
    persistent: true
    swap: false
    exclusive: false
    members:
    - "gemma-4-E2B-it"
    - "nomic-embed-text-v1.5"

  # On-demand slot. Members coexist in VRAM (swap: false) so image-then-
  # think workflows don't pay an E4B reload after captioning. Each model
  # carries its own ttl for idle eviction.
  "on-demand":
    swap: false
    exclusive: false
    members:
    - "gemma-4-E4B-it"
    - "gemma-4-26B-A4B-it"
    - "qwen2-vl-2B-it"

models:
  # Tier-1 default (small). Pinned always-on per Phase C tuning — at
  # ~1.5 GB it costs little VRAM, and keeping it resident eliminates the
  # swap penalty on the workloads the router sends to it (short_q,
  # tool_use, most medium_q). The router still picks E4B for code-fenced
  # / complex-verb / long prompts; E4B remains swappable.
  "gemma-4-E2B-it":
    cmd: |-
      /app/llama-server --port ${PORT}
      -hf bartowski/google_gemma-4-E2B-it-GGUF:Q4_K_M
      -ngl 99 --ctx-size 8192 --jinja --flash-attn on
    tags: []
    groups:
    - always-on

  # Tier-2 default (larger). Used for complex/long prompts the router
  # decides E2B can't handle. NO LONGER carries the `vision` tag —
  # captioning routes to Qwen2-VL-2B (below) which handles both
  # verbatim text extraction and structural understanding in a single
  # call, with stronger OCR/document benchmarks than Gemma-4 for this
  # use case.
  "gemma-4-E4B-it":
    cmd: |-
      /app/llama-server --port ${PORT}
      -hf bartowski/google_gemma-4-E4B-it-GGUF:Q4_K_M
      -ngl 99 --ctx-size 32768 --jinja --flash-attn on
      --cache-type-k q8_0 --cache-type-v q8_0
    tags:
    - code
    groups:
    - on-demand
  # Tier-2 escalation (large). Used when the router's lexical heuristic or
  # tool-error / max-iterations triggers fire. 17 GB Q4_K_M with partial
  # MoE expert offload: experts in layers 0-7 stay on GPU; layers 8-29 go
  # to system RAM via the -ot regex below. Resident VRAM ~7-8 GB for the
  # 26B portion, ~60 tok/s generate. Emits to reasoning_content (Gemma 4
  # thinking mode on by default); backend surfaces that as a separate SSE
  # event stream.
  "gemma-4-26B-A4B-it":
    cmd: |-
      /app/llama-server --port ${PORT}
      -hf bartowski/google_gemma-4-26B-A4B-it-GGUF
      -hff google_gemma-4-26B-A4B-it-Q4_K_M.gguf
      -ngl 99 --ctx-size 32768 --jinja --flash-attn on
      --cache-type-k q8_0 --cache-type-v q8_0
      -ot "blk\.([8-9]|1[0-9]|2[0-9])\.ffn_.*_exps\.weight=CPU"
    tags:
    - code
    groups:
    - on-demand

  "qwen2-vl-2B-it":
    cmd: |-
      /app/llama-server --port ${PORT}
      -hf bartowski/Qwen2-VL-2B-Instruct-GGUF:Q4_K_M
      --mmproj-url https://huggingface.co/bartowski/Qwen2-VL-2B-Instruct-GGUF/resolve/main/mmproj-Qwen2-VL-2B-Instruct-f16.gguf
      -ngl 99 --ctx-size 8192 --jinja --flash-attn on
      --repeat-penalty 1.15
    # Captioning runs only on image upload. ttl=60 unloads the model
    # 60s after the last call so idle workspaces don't hold ~3GB VRAM.
    ttl: 60
    tags:
    - vision
    groups:
    - on-demand

  "nomic-embed-text-v1.5":
    cmd: >
      /app/llama-server --port ${PORT}
      -hf nomic-ai/nomic-embed-text-v1.5-GGUF:Q8_0
      -ngl 99 --embeddings --batch-size 8192
      --rope-scaling yarn --rope-freq-scale 0.75
    tags: ["embedding"]
